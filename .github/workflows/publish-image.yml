name: Publish Purple Agent Image

on:
  push:
    branches: ['main']
  workflow_dispatch: # Para poder lanzarlo manual si quieres

env:
  REGISTRY: ghcr.io
  # Usamos la variable automática de GitHub
  IMAGE_NAME: ${{ github.repository }}
  # 👇 AQUÍ ESTÁ LA NUEVA LÍNEA PARA SILENCIAR EL WARNING 👇
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ESTE PASO ES LA MAGIA:
      # Calcula los tags y asegura que el nombre esté en MINÚSCULAS (vital para Docker)
      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Como usamos la variable dinámica, usamos ./Dockerfile por defecto
          file: ./Dockerfile
          push: true
          # Aquí usamos el resultado del paso de metadata (automático y limpio)
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
